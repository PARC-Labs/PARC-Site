<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="PARC is a distributed, decentralised collective of artists, scientists and engineers.">
<meta name="theme-color" content="#fbfaf7">
<title>PARC</title>
<style>
:root{--bg:#fbfaf7;--ink:#061a33;--muted:rgba(6,26,51,.62);--line:rgba(6,26,51,.16);--line-soft:rgba(6,26,51,.065);--orange:#c94b2d;--orange-soft:rgba(201,75,45,.12)}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 48%,#000 0,transparent 72%);pointer-events:none}body:after{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 24% 70%,var(--orange-soft),transparent 25%);filter:blur(2px);pointer-events:none}main{position:relative;z-index:1;min-height:100dvh;display:grid;place-items:center;padding:clamp(20px,5vw,64px)}section{width:min(980px,100%);height:min(620px,calc(100dvh - clamp(40px,10vw,128px)));min-height:420px;position:relative;border:1px solid var(--line);display:grid;place-items:center;padding:clamp(24px,5vw,72px);isolation:isolate;background:rgba(251,250,247,.68)}section:after{content:"";position:absolute;inset:14px;border:1px solid rgba(201,75,45,.23);z-index:-1}.content{text-align:center;max-width:720px}.kicker,.system,.contact{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}h1{margin:.08em 0 .08em;font-size:clamp(4.8rem,18vw,13rem);line-height:.82;font-weight:500;letter-spacing:-.09em;color:var(--ink)}.statement{margin:0 auto;max-width:600px;font-size:clamp(1.04rem,2vw,1.36rem);line-height:1.42;color:rgba(6,26,51,.82);text-wrap:balance}.contact{display:inline-block;margin-top:clamp(32px,7vh,64px);color:var(--ink);text-decoration:none;border-bottom:1px solid var(--orange);padding-bottom:.36rem}.contact:hover,.contact:focus-visible{color:var(--orange);outline:0}.system{position:absolute;left:clamp(20px,3vw,34px);bottom:clamp(20px,3vw,34px);writing-mode:vertical-rl;transform:rotate(180deg);opacity:.72}.mark{position:absolute;right:clamp(20px,3vw,34px);top:clamp(20px,3vw,34px);width:9px;height:9px;background:var(--orange)}@media(max-width:640px){section{height:calc(100dvh - 40px);min-height:0}.system{writing-mode:horizontal-tb;transform:none;left:24px;right:24px;text-align:center}}@media(max-height:560px){section{height:calc(100dvh - 28px);padding:20px}h1{font-size:clamp(4rem,16vw,8rem)}.contact{margin-top:24px}.system{display:none}}
</style>
</head>
<body>
<main aria-label="PARC landing page">
<section aria-labelledby="title">
<div class="mark" aria-hidden="true"></div>
<div class="content">
<div class="kicker">Artists · Scientists · Engineers</div>
<h1 id="title">PARC</h1>
<p class="statement">A distributed, decentralised collective of artists, scientists and engineers.</p>
<a class="contact" href="mailto:contact@parc-labs.org">contact@parc-labs.org</a>
</div>
<div class="system" aria-hidden="true">Distributed / Decentralised</div>
</section>
</main>
</body>
</html>
