<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="PARC is an artist-science collective for ecological systems, field research, and public imagination.">
<meta name="theme-color" content="#07111a">
<title>PARC</title>
<style>
:root{--bg:#07111a;--ink:#eef5f8;--muted:rgba(238,245,248,.62);--line:rgba(238,245,248,.18);--blue:#4f9bd8;--orange:#e96f3a}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body:before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(238,245,248,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(238,245,248,.035) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle at 52% 48%,#000 0,transparent 72%);pointer-events:none}body:after{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 72% 34%,rgba(79,155,216,.18),transparent 24%),radial-gradient(circle at 28% 68%,rgba(233,111,58,.14),transparent 28%);filter:blur(2px);pointer-events:none}main{position:relative;z-index:1;min-height:100dvh;display:grid;place-items:center;padding:clamp(20px,5vw,64px)}section{width:min(960px,100%);height:min(620px,calc(100dvh - clamp(40px,10vw,128px)));min-height:420px;position:relative;border:1px solid var(--line);display:grid;place-items:center;padding:clamp(24px,5vw,72px);isolation:isolate}section:before{content:"";position:absolute;width:min(58vw,520px);aspect-ratio:1;border:1px solid rgba(79,155,216,.34);border-radius:50%;transform:rotate(-12deg) scaleX(1.22);opacity:.68;z-index:-1}section:after{content:"";position:absolute;inset:14px;border:1px solid rgba(233,111,58,.18);z-index:-1}.content{text-align:center;max-width:650px}.kicker,.coordinates,.contact{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}h1{margin:.08em 0 .03em;font-size:clamp(4.8rem,18vw,13rem);line-height:.82;font-weight:500;letter-spacing:-.09em}.statement{margin:0 auto;max-width:520px;font-size:clamp(1rem,2vw,1.32rem);line-height:1.42;color:rgba(238,245,248,.78);text-wrap:balance}.contact{display:inline-block;margin-top:clamp(32px,7vh,64px);color:var(--ink);text-decoration:none;border-bottom:1px solid rgba(233,111,58,.72);padding-bottom:.36rem}.contact:hover,.contact:focus-visible{color:#fff;border-bottom-color:var(--blue);outline:0}.coordinates{position:absolute;left:clamp(20px,3vw,34px);bottom:clamp(20px,3vw,34px);writing-mode:vertical-rl;transform:rotate(180deg);opacity:.72}.mark{position:absolute;right:clamp(20px,3vw,34px);top:clamp(20px,3vw,34px);width:9px;height:9px;border-radius:50%;background:var(--orange);box-shadow:0 0 28px rgba(233,111,58,.72)}@media(max-width:640px){section{height:calc(100dvh - 40px);min-height:0}.coordinates{writing-mode:horizontal-tb;transform:none;left:24px;right:24px;text-align:center}}@media(max-height:560px){section{height:calc(100dvh - 28px);padding:20px}h1{font-size:clamp(4rem,16vw,8rem)}.contact{margin-top:24px}.coordinates{display:none}}
</style>
</head>
<body>
<main aria-label="PARC landing page">
<section aria-labelledby="title">
<div class="mark" aria-hidden="true"></div>
<div class="content">
<div class="kicker">Artist · Science · Fieldwork</div>
<h1 id="title">PARC</h1>
<p class="statement">An artist-science collective for ecological systems, field research, and public imagination.</p>
<a class="contact" href="mailto:contact@parc-labs.org">contact@parc-labs.org</a>
</div>
<div class="coordinates" aria-hidden="true">Plettenberg Bay / Living Systems</div>
</section>
</main>
</body>
</html>
